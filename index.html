<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BANAA的个人网站</title>
  <!-- 1. 引入 CSS 样式 -->
  <link rel="stylesheet" href="css/style.css">
  <!-- 2. 引入 Markdown 解析库（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>我的个人网站</h1>
      <p>智能车辆工程｜意向前端方向</p>
      <button id="themeBtn">🌙 深色模式</button>
    </div>

    <!-- 各个板块 -->
    <div class="section" data-md="md/about-me.md">
      <h2 onclick="toggle(this)"> 关于我</h2>
      <div class="content"></div>
    </div>

    <div class="section" data-md="md/my-skills.md">
      <h2 onclick="toggle(this)"> 技能栈</h2>
      <div class="content"></div>
    </div>

    <div class="section" data-md="md/project.md">
      <h2 onclick="toggle(this)"> 项目经历</h2>
      <div class="content"></div>
    </div>

    <div class="section" data-md="md/contact.md">
      <h2 onclick="toggle(this)"> 联系方式</h2>
      <div class="content"></div>
    </div>
  </div>

  <button class="back-top" id="backTop">↑</button>

  <!-- 3. 引入 JavaScript 文件（放在最后加载） -->
  <script src="js/main.js"></script>
</body>
</html>
