<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>笔记详情</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      padding: 0;
      margin: 0;
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    .note-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .back-bar {
      margin-bottom: 30px;
    }
    .back-btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--main);
      text-decoration: none;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: var(--main);
      color: #fff;
    }
    .note-card {
      background: var(--card);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      animation: fadeIn 0.6s ease forwards;
    }
    .note-title {
      font-size: 26px;
      font-weight: bold;
      color: var(--main);
      margin-bottom: 20px;
      line-height: 1.3;
    }
    .note-content {
      line-height: 1.8;
      font-size: 15px;
    }
    .note-content h1,
    .note-content h2,
    .note-content h3 {
      margin: 24px 0 12px;
      color: var(--main);
    }
    .note-content p {
      margin: 12px 0;
    }
    .note-content ul,
    .note-content ol {
      padding-left: 22px;
      margin: 14px 0;
    }
    .note-content li {
      margin: 6px 0;
    }
    .note-content code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--main);
    }
    .note-content pre {
      background: var(--bg);
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .note-content pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="note-container">
    <div class="back-bar">
      <a href="index.html" class="back-btn">← 返回主页</a>
    </div>
    <div class="note-card">
      <div id="note-title" class="note-title">加载中...</div>
      <div id="note-content" class="note-content"></div>
    </div>
  </div>

  <script>
    // ———— 强制同步主题 ————
    const isDark = localStorage.getItem('darkMode') === 'true'
    document.body.classList.toggle('dark', isDark)

    const q = new URLSearchParams(location.search)
    const mdFile = q.get('md')
    const title = q.get('title')

    document.getElementById('note-title').textContent = title

    fetch('md/' + mdFile)
      .then(r => r.text())
      .then(t => {
        document.getElementById('note-content').innerHTML = marked.parse(t)
      })
  </script>
</body>
</html>
